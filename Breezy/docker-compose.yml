services:
  caddy:
    image: caddy:latest
    container_name: caddy-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile  # Your configuration file
      - caddy_data:/data                 # Stores SSL certificates
      - caddy_config:/config
    depends_on:
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vite-frontend
    # Note: We remove the 'ports' mapping here because Caddy handles the public access
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always

volumes:
  caddy_data:
  caddy_config: